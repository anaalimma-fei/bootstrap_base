<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-bootstrap-fill text-light"></i>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active text-light" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="#">Sobre</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#exemploModal">
                            Contato
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="exemploModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                
                <div class="modal-header">
                    <h5 class="modal-title">Contato</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form class="custom-form needs-validation" novalidate>
                    <div class="modal-body">
                        
                        <div class="row">
                            <div class="col-sm-6 mb-3">
                                <div class="input-group">
                                    <span class="input-group-text custom-icon">
                                        <i class="bi bi-envelope"></i>
                                    </span>
                                    <input type="email" name="email" id="email" class="form-control custom-input" placeholder="Email" required>
                                </div>
                            </div>

                            <div class="col-sm-6 mb-3">
                                <div class="input-group">
                                    <span class="input-group-text custom-icon">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" name="Senha" id="senha" class="form-control custom-input" placeholder="Senha" required>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4 text-muted border-white-50">

                        <h5>Mande sua mensagem</h5>
                        <div class="notepad-area mb-3">
                            <textarea id="note-input" class="form-control" rows="3" placeholder="Feedback"></textarea>
                            
                        </div>

                       
                        
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary custom-button">
                            Enviar <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
